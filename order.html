!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
 
<title>Mock SAP Purchase Order</title>
 
<style>
 
body{
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
 
.card{
    background:#222;
    padding:40px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,255,255,.1);
}
 
.number{
    color:#4FC3F7;
    font-size:42px;
    margin-top:20px;
}
 
</style>
 
</head>
 
<body>
 
<div class="card">
 
<h1>Mock SAP Purchase Order</h1>
 
<p>This is your Purchase Order:</p>
 
<div class="number" id="po"></div>
 
</div>
 
<script>
 
const params = new URLSearchParams(window.location.search);
 
const po = params.get("po");
 
document.getElementById("po").innerHTML = po || "Unknown";
 
</script>
 
</body>
 
</html>
